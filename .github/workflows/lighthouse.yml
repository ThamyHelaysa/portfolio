name: Lighthouse Performance Audit
on:
  push:
    paths:
      - 'v2-blog/**'
      - '.github/workflows/lighthouse.yml'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://thamy-v2-blog.netlify.app/
            https://thamy-v2-blog.netlify.app/about/
            https://thamy-v2-blog.netlify.app/blog/
            https://thamy-v2-blog.netlify.app/notes/
            https://thamy-v2-blog.netlify.app/games-that-i-may-or-may-not-play/
            https://thamy-v2-blog.netlify.app/copyrighty/
          configPath: ./v2-blog/.lighthouserc.json
