name: Lighthouse Performance Audit
on:
  push:
    paths:
      - 'v2-blog/**'
      - '.github/workflows/lighthouse.yml'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: v2-blog/package-lock.json

      - name: Install V2 dependencies
        working-directory: ./v2-blog
        run: npm ci

      - name: Build V2
        working-directory: ./v2-blog
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./v2-blog/.lighthouserc.github.json
